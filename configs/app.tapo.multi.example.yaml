app_name: dog-rise-alert
storage:
  artifacts_dir: artifacts
  review_queue_dir: review_queue
  exports_dir: exports
ingest:
  backend: opencv
  # Default camera order priority for both daytime and nighttime operations: b > c > a
  camera_id: b
  camera_index: 0
  device_path:
  rtsp_url:
  sample_fps: 1.0
  max_frames: 20
  frame_width:
  frame_height:
cameras:
  # 192.168.219.111 -> camera 1 / a
  # Priority order: 3
  - camera_id: a
    aliases: [1]
    rtsp_url: rtsp://${TAPO_USERNAME}:${TAPO_PASSWORD}@192.168.219.111:554/stream1
    enabled: true
  # 192.168.219.112 -> camera 2 / b
  # Priority order: 1
  - camera_id: b
    aliases: [2]
    rtsp_url: rtsp://${TAPO_USERNAME}:${TAPO_PASSWORD}@192.168.219.112:554/stream1
    enabled: true
  # 192.168.219.113 -> camera 3 / c
  # Priority order: 2
  - camera_id: c
    aliases: [3]
    rtsp_url: rtsp://${TAPO_USERNAME}:${TAPO_PASSWORD}@192.168.219.113:554/stream1
    enabled: true
detection:
  backend: hailo_hef
  confidence_threshold: 0.20
  model_path: /usr/share/hailo-models/yolov8s_h8.hef
  config_path:
  labels_path: configs/dog_labels.coco.txt
  dog_class_names:
    - dog
    - horse
  context_class_names:
    - person
    - cat
  input_width: 640
  input_height: 640
  scale_factor: 0.00392156862745098
  swap_rb: true
  stream_interface: PCIe
motion_gate:
  enabled: false
  roi:
  pixel_diff_threshold: 20.0
  min_changed_ratio: 0.008
pipeline:
  frame_window_size: 30
  detector_confidence_threshold: 0.20
  event_gap_seconds: 2.0
  min_event_seconds: 1.0
  alert_cooldown_seconds: 300.0
  enable_clip_capture: false
rules:
  failed_attempt_min_attempts: 2
  failed_attempt_min_duration_seconds: 10.0
  min_body_lift_ratio: 0.07
  max_progress_ratio: 0.50
notifier:
  backend: stdout
  telegram:
    bot_token_env: TELEGRAM_BOT_TOKEN
    chat_id_env: TELEGRAM_CHAT_ID
